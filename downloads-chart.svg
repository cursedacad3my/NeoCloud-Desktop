<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="areaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff5500;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#ff5500;stop-opacity:0.03"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes draw {
        from { stroke-dashoffset: 1400; }
        to { stroke-dashoffset: 0; }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .line-path {
        stroke-dasharray: 1400;
        stroke-dashoffset: 1400;
        animation: draw 2s ease-out forwards;
      }
      .area-path {
        opacity: 0;
        animation: fadeIn 1s ease-out 0.35s forwards;
      }
      .data-point, .text-anim {
        opacity: 0;
        animation: fadeIn 0.5s ease-out 0.8s forwards;
      }
    </style>
  </defs>

  <rect width="800" height="400" fill="#0d1117" rx="8"/>

  <text x="400" y="28" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" class="text-anim">
    Teiwazik/SoundCloud-DesktopFork Downloads
  </text>

  <text x="780" y="28" text-anchor="end" fill="#ff5500" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" class="text-anim">
    2053 total
  </text>
  <text x="780" y="46" text-anchor="end" fill="#3fb950" font-family="system-ui, -apple-system, sans-serif" font-size="12" class="text-anim">
    6.3.2 latest
  </text>

  <g opacity="0.1">
    <line x1="60" y1="340" x2="760" y2="340" stroke="#c9d1d9" stroke-width="1"/>
    <line x1="60" y1="281" x2="760" y2="281" stroke="#c9d1d9" stroke-width="1"/>
    <line x1="60" y1="222" x2="760" y2="222" stroke="#c9d1d9" stroke-width="1"/>
    <line x1="60" y1="163" x2="760" y2="163" stroke="#c9d1d9" stroke-width="1"/>
    <line x1="60" y1="104" x2="760" y2="104" stroke="#c9d1d9" stroke-width="1"/>
  </g>

  <g fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11" class="text-anim">
