    <text x="50" y="285" text-anchor="end">500</text>
    <text x="50" y="226" text-anchor="end">1000</text>
    <text x="50" y="167" text-anchor="end">1500</text>
    <text x="50" y="108" text-anchor="end">2000</text>
  </g>

  <g fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11" class="text-anim">
    <text x="60" y="360" text-anchor="middle">Mar 21</text>
    <text x="134.2" y="360" text-anchor="middle">Mar 24</text>
    <text x="208.5" y="360" text-anchor="middle">Mar 26</text>
    <text x="325.2" y="360" text-anchor="middle">Mar 28</text>
    <text x="494.4" y="360" text-anchor="middle">Mar 31</text>
    <text x="663.7" y="360" text-anchor="middle">Apr 05</text>
    <text x="760" y="360" text-anchor="middle">Apr 06</text>
  </g>

  <path d="M 60 339.8 L 85 339.7 L 110 339.5 L 134.2 339.4 L 160 339.2 L 185 339 L 208.5 338.7 L 230 337.8 L 255 336.5 L 280 334.8 L 305 332.5 L 325.2 325.8 L 350 275.2 L 375 240.8 L 400 208.4 L 420 190.2 L 440 180.5 L 460 173.8 L 480 168.2 L 494.4 160.5 L 520 155.8 L 545 151.2 L 570 147.5 L 595 144.2 L 620 141.5 L 645 139.2 L 663.7 136.8 L 690 136.2 L 715 136.1 L 740 136.1 L 760 136 L 760 340 Z" fill="url(#areaGradient)" class="area-path"/>

  <path d="M 60 339.8 L 85 339.7 L 110 339.5 L 134.2 339.4 L 160 339.2 L 185 339 L 208.5 338.7 L 230 337.8 L 255 336.5 L 280 334.8 L 305 332.5 L 325.2 325.8 L 350 275.2 L 375 240.8 L 400 208.4 L 420 190.2 L 440 180.5 L 460 173.8 L 480 168.2 L 494.4 160.5 L 520 155.8 L 545 151.2 L 570 147.5 L 595 144.2 L 620 141.5 L 645 139.2 L 663.7 136.8 L 690 136.2 L 715 136.1 L 740 136.1 L 760 136"
    fill="none"
    stroke="#ff5500"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
    class="line-path"/>

  <circle cx="60" cy="339.8" r="4" fill="#ff5500" stroke="#0d1117" stroke-width="2" class="data-point"/>
  <circle cx="134.2" cy="339.4" r="4" fill="#ff5500" stroke="#0d1117" stroke-width="2" class="data-point"/>
  <circle cx="208.5" cy="338.7" r="4" fill="#ff5500" stroke="#0d1117" stroke-width="2" class="data-point"/>
  <circle cx="325.2" cy="325.8" r="4" fill="#ff5500" stroke="#0d1117" stroke-width="2" class="data-point"/>
  <circle cx="494.4" cy="160.5" r="4" fill="#ff5500" stroke="#0d1117" stroke-width="2" class="data-point"/>
  <circle cx="663.7" cy="136.8" r="4" fill="#ff5500" stroke="#0d1117" stroke-width="2" class="data-point"/>
  <circle cx="760" cy="136" r="4" fill="#ff5500" stroke="#0d1117" stroke-width="2" class="data-point"/>

  <line x1="60" y1="55" x2="60" y2="340" stroke="#30363d" stroke-width="2"/>
  <line x1="60" y1="340" x2="760" y2="340" stroke="#30363d" stroke-width="2"/>

  <g fill="#c9d1d9" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" class="text-anim">
    <text x="20" y="370">&#9733; 3 stars</text>
    <text x="20" y="388">&#9741; 0 forks</text>
  </g>

  <g fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11" class="text-anim">
    <text x="760" y="388" text-anchor="end">Cumulative release downloads from GitHub Releases</text>
  </g>
