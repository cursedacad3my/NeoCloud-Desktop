<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="areaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff5500;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#ff5500;stop-opacity:0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes draw {
        from { stroke-dashoffset: 1200; }
        to { stroke-dashoffset: 0; }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .line-path {
        stroke-dasharray: 1200;
        stroke-dashoffset: 1200;
        animation: draw 2s ease-out forwards;
      }
      .area-path {
        opacity: 0;
        animation: fadeIn 1s ease-out 0.5s forwards;
      }
      .data-point {
        opacity: 0;
        animation: fadeIn 0.5s ease-out 1.2s forwards;
      }
      .text-anim {
        opacity: 0;
        animation: fadeIn 0.5s ease-out 0.3s forwards;
      }
    </style>
  </defs>

  <rect width="800" height="400" fill="#0d1117" rx="8"/>

  <text x="400" y="28" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" class="text-anim">
